<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Theme logic
			if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
				document.documentElement.classList.add('dark')
			} else {
				document.documentElement.classList.remove('dark')
			}
			
			// Accent color logic
			const storedAccent = localStorage.getItem('accentColor');
			if (storedAccent) {
				const colors = generateAccentPalette(storedAccent);
				const style = document.createElement('style');
				style.id = 'accent-theme-override';
				let css = ':root { ';
				for (const [shade, val] of Object.entries(colors)) {
					css += `--color-indigo-${shade}: ${val} !important; `;
				}
				css += '}';
				style.innerHTML = css;
				document.head.appendChild(style);
			}

			function generateAccentPalette(hex) {
				// simple fallback palette generator
				const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
				const makeRGB = (r, g, b, alpha=1) => `color(srgb ${r/255} ${g/255} ${b/255} / ${alpha})`;
				// Generate basic tints and shades logic
				return {
					50:  mixColors(hex, '#ffffff', 0.95),
					100: mixColors(hex, '#ffffff', 0.9),
					200: mixColors(hex, '#ffffff', 0.75),
					300: mixColors(hex, '#ffffff', 0.6),
					400: mixColors(hex, '#ffffff', 0.3),
					500: hex,
					600: mixColors(hex, '#000000', 0.1),
					700: mixColors(hex, '#000000', 0.3),
					800: mixColors(hex, '#000000', 0.5),
					900: mixColors(hex, '#000000', 0.7),
					950: mixColors(hex, '#000000', 0.85)
				};
			}

			function mixColors(color1, color2, weight) {
				const c1 = [parseInt(color1.slice(1,3),16), parseInt(color1.slice(3,5),16), parseInt(color1.slice(5,7),16)];
				const c2 = [parseInt(color2.slice(1,3),16), parseInt(color2.slice(3,5),16), parseInt(color2.slice(5,7),16)];
				const mixed = c1.map((v, i) => Math.round(v * (1 - weight) + c2[i] * weight));
				return '#' + mixed.map(v => v.toString(16).padStart(2, '0')).join('');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 transition-colors duration-200">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
